<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLRP Creative Studio filenaming tool</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-color: #2E2E2E;
      position: relative;
    }

    /* Subtle noise overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>\
<filter id='n'>\
<feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/>\
</filter>\
<rect width='100%' height='100%' filter='url(%23n)' opacity='0.03'/>\
</svg>");
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 540px;
      margin: auto;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow:
        0 12px 32px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo img {
      max-width: 220px;
      height: auto;
    }

    h2 { text-align: center; }

    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.9);
    }

    .result-label {
      text-align: center;
      font-size: 12px;
      margin: 20px 0 6px;
    }

    .result {
      padding: 12px;
      background: rgba(246,246,246,0.85);
      border-left: 4px solid #007AC3;
      border-radius: 6px;
      font-weight: bold;
      text-align: center;
      word-break: break-word;
    }

    .disclaimer {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Wolters Kluwer Logo -->
  <div class="logo">
    <img
      src="https://assets.contenthub.wolterskluwer.com/api/public/content/2307077-wolters-kluwer-preferred-logo-002a6c0a50?v=906170ea"
      alt="Wolters Kluwer logo"
    />
  </div>

  <h2>HLRP Creative Studio filenaming tool</h2>

  <label>Tactic Number</label>
  <input id="tactic" type="text" oninput="updateResult()"
         placeholder="Copy and paste the tactic number from Smartsheet here" />

  <label>Select the creative channel type from dropdown</label>
  <select id="channel" oninput="updateResult()">
    <option value="">Select</option>
    <option value="ADVT">Creative (Advertising)</option>
    <option value="BR">Creative (Brochure)</option>
    <option value="CS">Creative (Case Study)</option>
    <option value="CAT">Creative (Catalog)</option>
    <option value="EBD">Creative (Event / Backdrop)</option>
    <option value="FS">Creative (Fact Sheet)</option>
    <option value="FLY">Creative (Flyer / Exemplars)</option>
    <option value="PB">Creative (Playbook)</option>
    <option value="PC">Creative (Post Card)</option>
    <option value="POS">Creative (Poster)</option>
    <option value="QRC">Creative (Quick Reference Card)</option>
    <option value="WP">Creative (White Paper)</option>
    <option value="PP">Creative (Position Paper)</option>
    <option value="AZA">Creative (Amazon A+)</option>
    <option value="DB">Creative (Digital Banner)</option>
    <option value="ICON">Creative (Icons)</option>
    <option value="INFO">Creative (Infographic)</option>
    <option value="VID">Creative (Video)</option>
    <option value="PPT">Creative (PPT)</option>
    <option value="SMO">Creative (Social Media - Organic)</option>
    <option value="SMP">Creative (Social Media - Paid)</option>
    <option value="EML">Creative (Email)</option>
    <option value="ABM">Creative (ABM)</option>
  </select>

  <label>TaskName</label>
  <input id="project" type="text" oninput="updateResult()"
         placeholder="Copy the TaskName from Smartsheet and edit it to be short, if needed" />

  <label>Size</label>
  <input id="size" type="text" oninput="updateResult()"
         placeholder="Enter size for eg. 8-5x11, A4, 1080x1080, etc." />

  <div class="result-label">
    <span style="color:#007AC3;">Tactic#</span>-
    <span style="color:#E5202E;">ChannelType</span>-
    <span style="color:#000000;">TaskName</span>-
    <span style="color:#85BC20;">Size</span>
  </div>

  <div class="result" id="result">Filename will appear here</div>

  <div class="disclaimer">
    Built using M365 Copilot AI by Bala
  </div>

</div>

<script>
  function updateResult() {
    const tactic = document.getElementById("tactic").value.trim();
    const channel = document.getElementById("channel").value;
    const project = document.getElementById("project").value.replace(/\s+/g, "");
    const size = document.getElementById("size").value.trim();

    document.getElementById("result").innerText =
      [tactic, channel, project, size].filter(Boolean).join("-") ||
      "Filename will appear here";
  }
</script>

</body>
</html>
